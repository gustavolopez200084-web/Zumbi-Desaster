<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zumbi Desaster - Defenda a sua Base</title>
    <meta name="description"
        content="Um jogo de sobrevivência 2D top-down onde você defende sua base contra hordas de zumbis. Construído com Phaser 3.">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0c;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.2);
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>

<body>
    <div id="game-container"></div>
    <script src="game.js"></script>
</body>

</html>
